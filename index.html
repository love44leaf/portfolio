<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Portfolio Viewer</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="topbar-left">
      <span id="fileName" class="file-name">portfolio.pdf</span>
      <a id="downloadBtn" class="icon-btn icon-btn-download" download title="다운로드" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
      </a>
    </div>
    <div class="topbar-right">
      <button id="zoomOut" class="icon-btn" aria-label="축소" title="축소">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span id="zoomLevel" class="zoom-level">100%</span>
      <button id="zoomIn" class="icon-btn" aria-label="확대" title="확대">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="divider"></span>
      <span class="page-indicator">
        <input id="pageInput" class="page-input" type="text" inputmode="numeric" value="1" aria-label="현재 페이지" />
        <span class="page-sep">/</span>
        <span id="pageTotal">0</span>
      </span>
    </div>
  </header>

  <div class="body">
    <aside id="sidebar" class="sidebar">
      <div id="thumbList" class="thumb-list"></div>
    </aside>

    <main id="viewer" class="viewer">
      <button id="prevBtn" class="nav-btn nav-prev" aria-label="이전 슬라이드">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div id="canvas" class="canvas">
        <img id="slideImage" class="slide-image" alt="" draggable="false" />
        <div id="emptyState" class="empty-state" hidden>
          <p>images 폴더에 01.png, 02.png ... 형식으로 슬라이드를 추가해 주세요.</p>
        </div>
      </div>

      <button id="nextBtn" class="nav-btn nav-next" aria-label="다음 슬라이드">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </main>
  </div>

  <button id="toggleSidebar" class="sidebar-toggle" aria-label="썸네일 패널 열기/닫기" title="썸네일 패널">
    <svg id="toggleIcon" width="20" height="20" viewBox="0 -960 960 960" fill="currentColor">
      <path d="M200-120q-33,0-56.5-23.5T120-200V-760q0-33 23.5-56.5T200-840H760q33,0 56.5,23.5T840-760v560q0,33-23.5,56.5T760-120H200Zm120-80V-760H200v560H320Zm80,0H760V-760H400v560Zm-80,0H200H320Z"/>
      <path id="toggleArrow" d="M660-320V-640L500-480L660-320Z"/>
    </svg>
  </button>
</div>

<script src="js/app.js"></script>
</body>
</html>
